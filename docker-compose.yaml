services:
  # --- PostgreSQL ---
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: samil
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: myappdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samil -d myappdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis & RedisInsight ---
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis_ui
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

  # --- Mock Webhook ---
  mockwebhook:
    build: ./mockwebhook
    container_name: mock_webhook
    ports:
      - "8888:8888"

  # --- Server ---
  server:
    build: .
    command: ["./server"]
    container_name: notification_server
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: samil
      DB_PASSWORD: mysecretpassword
      DB_NAME: myappdb
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: "8080"
      WEBHOOK_URL: http://mockwebhook:8888
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mockwebhook:
        condition: service_started

  # --- Worker ---
  worker:
    build: .
    command: ["./worker"]
    container_name: notification_worker
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: samil
      DB_PASSWORD: mysecretpassword
      DB_NAME: myappdb
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WEBHOOK_URL: http://mockwebhook:8888
      WORKER_CONCURRENCY: 20
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mockwebhook:
        condition: service_started

  # --- Monitoring ---
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  alloy:
    image: grafana/alloy:v1.7.2
    container_name: alloy
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: explore
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data: