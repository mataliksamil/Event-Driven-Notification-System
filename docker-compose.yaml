services:
  # --- PostgreSQL ---
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: samil
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: myappdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samil -d myappdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis & RedisInsight ---
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis_ui
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

  # --- Mock Webhook ---
  mockwebhook:
    build: ./mockwebhook
    container_name: mock_webhook
    ports:
      - "8888:8888"

  # --- Server ---
  server:
    build: .
    command: ["./server"]
    container_name: notification_server
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: samil
      DB_PASSWORD: mysecretpassword
      DB_NAME: myappdb
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: "8080"
      WEBHOOK_URL: http://mockwebhook:8888
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mockwebhook:
        condition: service_started

  # --- Worker ---
  worker:
    build: .
    command: ["./worker"]
    container_name: notification_worker
    ports:
      - "9090:9090"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: samil
      DB_PASSWORD: mysecretpassword
      DB_NAME: myappdb
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WEBHOOK_URL: http://mockwebhook:8888
      WORKER_CONCURRENCY: 20
      METRICS_PORT: "9090"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mockwebhook:
        condition: service_started

  # --- Monitoring: Loki ---
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Monitoring: Alloy ---
  alloy:
    image: grafana/alloy:v1.7.2
    container_name: alloy
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    depends_on:
      loki:
        condition: service_healthy

  # --- Monitoring: Grafana ---
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: explore
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy

  # --- Monitoring: Prometheus ---
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    ports:
      - "9099:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-remote-write-receiver"

  # --- Monitoring: Redis Exporter ---
  redis-exporter:
    image: oliver006/redis_exporter:v1.69.0-alpine
    container_name: redis_exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # --- Monitoring: PostgreSQL Exporter ---
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres_exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://samil:mysecretpassword@db:5432/myappdb?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

  # --- Monitoring: Node Exporter ---
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"

  # --- Load Testing: k6 ---
  k6:
    image: grafana/k6:latest
    container_name: k6
    profiles: ["load-test"]
    volumes:
      - ./tests/performance:/tests
    environment:
      BASE_URL: http://server:8080
      MOCK_URL: http://mockwebhook:8888
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
    depends_on:
      - server
      - worker
      - mockwebhook

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:
  prometheus_data: